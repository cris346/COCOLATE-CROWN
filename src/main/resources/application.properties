# =============================================
# Crown Backend - Application Properties
# =============================================
# All sensitive values are loaded from .env file
# via spring-dotenv. Use env.VAR_NAME to reference them.

# Server
server.port=${PORT:8080}

# Database (Supabase PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/crown}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS (for Angular frontend)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Initialize DB schema from SQL file on first run
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
